<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        /* Smooth backdrop blur animation */
        .glass-panel {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        /* Autofill style fix for dark mode */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0f0f0f inset !important;
            -webkit-text-fill-color: #e2e8f0 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="bg-neutral-950 text-slate-300 min-h-screen flex items-center justify-center p-4 selection:bg-amber-500/30 selection:text-amber-200 overflow-hidden relative">

    <!-- Cinematic Background Image with Overlay -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop" alt="Background" class="w-full h-full object-cover opacity-40">
        <div class="absolute inset-0 bg-gradient-to-t from-neutral-950 via-neutral-950/90 to-neutral-950/60"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-neutral-950/80 via-transparent to-neutral-950/80"></div>
    </div>

    <!-- Ambient Glow Effects -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-amber-600/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-900/20 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Main Container -->
    <main class="relative z-10 w-full max-w-md">
        
        <!-- Logo Branding -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-neutral-800 to-neutral-950 border border-white/10 flex items-center justify-center shadow-xl shadow-black/50 mb-4">
                <iconify-icon icon="solar:clapperboard-play-linear" class="text-amber-500 text-2xl" stroke-width="1.5"></iconify-icon>
            </div>
            <h1 class="text-white text-2xl font-semibold tracking-tight">LUXECINEMA</h1>
            <p class="text-slate-500 text-sm mt-1 tracking-wide">Trải nghiệm điện ảnh đỉnh cao</p>
        </div>

        <!-- Login Card -->
        <div class="glass-panel border border-white/5 rounded-2xl shadow-2xl shadow-black/80 p-8 sm:p-10 relative overflow-hidden group">
            
            <!-- Subtle shimmer effect on top border -->
            <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

            <form action="#" method="POST" class="space-y-6">
                
                <!-- Phone Input -->
                <div class="space-y-1.5">
                    <label for="phone" class="text-xs font-medium text-slate-400 ml-1">Số điện thoại</label>
                    <div class="relative group/input">
                        <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 transition-colors group-focus-within/input:text-amber-500">
                            <iconify-icon icon="solar:smartphone-linear" width="20" stroke-width="1.5"></iconify-icon>
                        </div>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="0912 345 678"
                            class="w-full bg-[#0f0f0f] border border-white/5 text-slate-200 text-sm rounded-xl py-3 pl-11 pr-4 placeholder:text-slate-600 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all duration-300 shadow-inner shadow-black/50"
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-1.5">
                    <div class="flex items-center justify-between ml-1">
                        <label for="password" class="text-xs font-medium text-slate-400">Mật khẩu</label>
                        <a href="#" class="text-xs text-amber-500/80 hover:text-amber-400 transition-colors">Quên mật khẩu?</a>
                    </div>
                    <div class="relative group/input">
                        <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 transition-colors group-focus-within/input:text-amber-500">
                            <iconify-icon icon="solar:lock-password-linear" width="20" stroke-width="1.5"></iconify-icon>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            class="w-full bg-[#0f0f0f] border border-white/5 text-slate-200 text-sm rounded-xl py-3 pl-11 pr-11 placeholder:text-slate-600 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all duration-300 shadow-inner shadow-black/50"
                        >
                        <button type="button" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors focus:outline-none">
                            <iconify-icon icon="solar:eye-closed-linear" width="20" stroke-width="1.5"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="flex items-center">
                    <div class="flex items-center h-5">
                        <input id="remember" type="checkbox" class="w-4 h-4 border border-slate-600 rounded bg-transparent checked:bg-amber-500 checked:border-amber-500 focus:ring-1 focus:ring-offset-0 focus:ring-amber-500/50 appearance-none relative cursor-pointer after:content-[''] after:absolute after:inset-0 after:flex after:justify-center after:items-center after:text-white after:text-[10px] checked:after:content-['✓'] transition-all">
                    </div>
                    <label for="remember" class="ml-2 text-xs text-slate-400 select-none cursor-pointer hover:text-slate-300 transition-colors">Ghi nhớ đăng nhập</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full relative group overflow-hidden rounded-xl p-[1px]">
                    <span class="absolute inset-0 bg-gradient-to-r from-amber-700 via-amber-500 to-amber-700 opacity-80 group-hover:opacity-100 transition-opacity duration-300"></span>
                    <div class="relative bg-gradient-to-b from-amber-600 to-amber-700 hover:from-amber-500 hover:to-amber-600 text-white text-sm font-medium py-3 rounded-[10px] transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-amber-900/20">
                        <span>Đăng nhập ngay</span>
                        <iconify-icon icon="solar:arrow-right-linear" width="18" stroke-width="1.5" class="group-hover:translate-x-0.5 transition-transform"></iconify-icon>
                    </div>
                </button>

            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/5"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-2 text-slate-600 bg-[#0f0f0f] glass-panel rounded-full">Hoặc tiếp tục với</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-2 bg-[#151515] hover:bg-[#1a1a1a] border border-white/5 hover:border-white/10 rounded-xl py-2.5 transition-all duration-300 group">
                    <iconify-icon icon="flat-color-icons:google" width="20"></iconify-icon>
                    <span class="text-xs font-medium text-slate-300 group-hover:text-white">Google</span>
                </button>
                <button class="flex items-center justify-center gap-2 bg-[#151515] hover:bg-[#1a1a1a] border border-white/5 hover:border-white/10 rounded-xl py-2.5 transition-all duration-300 group">
                    <iconify-icon icon="logos:facebook" width="18"></iconify-icon>
                    <span class="text-xs font-medium text-slate-300 group-hover:text-white">Facebook</span>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center mt-8 text-xs text-slate-500">
            Chưa có tài khoản? 
            <a href="#" class="text-slate-300 hover:text-amber-500 font-medium transition-colors ml-1">Đăng ký tài khoản mới</a>
        </p>

    </main>
    
</body>
</html>
